name: Update Forecast & Observations

on:
  schedule:
    # Run every 20 minutes
    - cron: '*/20 * * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests xgboost numpy scikit-learn

      - name: Fetch Netatmo observations
        env:
          NETATMO_CLIENT_ID: ${{ secrets.NETATMO_CLIENT_ID }}
          NETATMO_CLIENT_SECRET: ${{ secrets.NETATMO_CLIENT_SECRET }}
          NETATMO_REFRESH_TOKEN: ${{ secrets.NETATMO_REFRESH_TOKEN }}
        run: python fetch_observations.py
        continue-on-error: true  # Don't fail if Netatmo is down

      - name: Generate debiased forecast
        run: python generate_forecast.py

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add docs/forecast.json docs/observations.json
          git diff --staged --quiet || git commit -m "Update forecast & observations $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
